name: Update README cards

on:
  schedule:
    # GitHub cron is UTC only; these two cover 23:00 Europe/Rome across DST
    # (21:00 UTC = 23:00 CEST in summer, 22:00 UTC = 23:00 CET in winter).
    # The "gate" job below ensures the build runs only when it is 23:00 in Rome.
    - cron: "0 21 * * *"
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ "$(TZ=Europe/Rome date +%H)" = "23" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Not 23:00 in Rome ($(TZ=Europe/Rome date +%H:%M)); skipping."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&theme=github_dark&show_icons=true&rank_icon=github&border_color=0d1117&count_private=true&include_all_commits=true
          path: assets/locals/kichkiro/kichkiro_github-stats.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=github_dark&langs_count=8&border_color=0d1117&hide=makefile,jupyter%20notebook,html,css,javascript,scss,php
          path: assets/locals/kichkiro/kichkiro_top-langs.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/locals/kichkiro/kichkiro_github-stats.svg assets/locals/kichkiro/kichkiro_top-langs.svg
          git commit -m "chore: update README stats cards" || exit 0
          git push
